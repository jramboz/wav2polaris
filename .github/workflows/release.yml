name: Build and publish release

on:
  push:
    tags:
      - "v*.*.*"

  pull_request:
    branches:
      - main
    # paths:
    #   - ".github/workflows/release.yml"
    #   - "app.py"
    #   - "requirements.txt"
    #   - "build-requirements.txt"
    #   - "tintalle-win.spec"
    #   - "tintalle-linux.spec"
    #   - "tintalle-mac.spec"
    #   - "tintalle.iss"
    #   - ".bumpversion.cfg"
    #   - "version_compare.py"
    #   - "update_checker.py"
    #   - "tests/**"
    #   - "packaging/linux/**"
    #   - "packaging/macos/**"
    #   - "translations/**"
    #   - "img/**"
    #   - "OpenCore_OEM/**"

  workflow_dispatch:
    inputs:
      version:
        description: >
          Version to build without the leading v. Leave empty to use
          script_version from app.py.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    outputs:
      version: ${{ steps.release-version.outputs.version }}
      tag: ${{ steps.release-version.outputs.tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      # - name: Install test dependencies
      #   run: |
      #     python -m pip install --upgrade pip
      #     python -m pip install -r requirements.txt

      # - name: Run unit tests
      #   run: python -m unittest discover -s tests -v

      - name: Check Python syntax
        run: |
          python -m compileall -q \
            src/wav2polaris

      - name: Validate release version
        id: release-version
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REQUESTED_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path


          def extract_version(
              filename: str,
              pattern: str,
              description: str,
          ) -> str:
              content = Path(filename).read_text(encoding="utf-8")
              match = re.search(pattern, content, re.MULTILINE)

              if match is None:
                  raise SystemExit(
                      f"Unable to find {description} in {filename}."
                  )

              return match.group(1)


          app_version = extract_version(
              "src/wav2polaris/app.py",
              r"^script_version\s*=\s*['\"]([^'\"]+)['\"]",
              "script_version",
          )

          bumpversion_version = extract_version(
              ".bumpversion.cfg",
              r"^current_version\s*=\s*(\S+)",
              "current_version",
          )

          event_name = os.environ["EVENT_NAME"]
          ref_name = os.environ["REF_NAME"]
          requested_version = os.environ.get(
              "REQUESTED_VERSION",
              "",
          ).strip()

          if event_name == "push":
              expected_version = ref_name.removeprefix("v")
          elif event_name == "workflow_dispatch" and requested_version:
            expected_version = requested_version.removeprefix("v")
          else:
              expected_version = app_version

          if re.fullmatch(
              r"[0-9]+\.[0-9]+\.[0-9]+",
              expected_version,
          ) is None:
              raise SystemExit(
                  "Release versions must use the X.Y.Z format. "
                  f"Received: {expected_version!r}"
              )

          version_locations = {
              "src/wav2polaris/app.py": app_version,
              ".bumpversion.cfg": bumpversion_version,
          }

          mismatches = {
              filename: version
              for filename, version in version_locations.items()
              if version != expected_version
          }

          if mismatches:
              details = "\n".join(
                  f"  {filename}: {version}"
                  for filename, version in mismatches.items()
              )

              raise SystemExit(
                  f"Expected release version {expected_version}, "
                  "but found mismatches:\n"
                  f"{details}"
              )

          output_file = Path(os.environ["GITHUB_OUTPUT"])

          with output_file.open("a", encoding="utf-8") as output:
              output.write(f"version={expected_version}\n")
              output.write(f"tag=v{expected_version}\n")

          print(f"Release version validated: {expected_version}")
          PY

