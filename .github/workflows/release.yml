  build-windows:
    name: Build Windows installer
    needs:
      - verify

    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            build-requirements.txt

      - name: Install Python build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r build-requirements.txt

      - name: Build PyInstaller distribution
        shell: pwsh
        run: |
          pyinstaller `
            --clean `
            --noconfirm `
            wav2polaris-win.spec

      - name: Verify Windows exe
        env:
          RELEASE_VERSION: ${{ needs.verify.outputs.version }}
        shell: pwsh
        run: |
          $exe = (
              "dist\wav2polaris-" +
              $env:RELEASE_VERSION +
              ".exe"
          )

          if (-not (Test-Path $exe)) {
              throw "Expected exe was not found: $exe"
          }

          Write-Host "Windows installer generated: $exe"

      - name: Upload Windows release asset
        uses: actions/upload-artifact@v6
        with:
          name: release-windows
          path: >-
            dist/wav2polaris-${{
              needs.verify.outputs.version
            }}.exe
          if-no-files-found: error
          retention-days: 14

  build-macos:
    strategy:
      matrix:
        # Separate jobs for Intel (x86_64) and Apple Silicon (arm64)
        include:
          - os: macos-15
            arch: arm64
          - os: macos-15-intel
            arch: x86_64

    name: Build signed and notarized macOS application
    if: >
      (github.event_name == 'push' &&
       startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' &&
       github.ref == 'refs/heads/ci-test')
    needs:
      - verify
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            build-requirements.txt

      - name: Validate macOS signing secrets
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_INSTALLER_CERTIFICATE_BASE64: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          MACOS_INSTALLER_IDENTITY: ${{ secrets.MACOS_INSTALLER_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          required_variables=(
            MACOS_CERTIFICATE_BASE64
            MACOS_CERTIFICATE_PASSWORD
            MACOS_KEYCHAIN_PASSWORD
            MACOS_CODESIGN_IDENTITY
            APPLE_ID
            APPLE_APP_SPECIFIC_PASSWORD
            APPLE_TEAM_ID
            MACOS_INSTALLER_CERTIFICATE_BASE64
            MACOS_INSTALLER_IDENTITY
          )

          for variable in "${required_variables[@]}"; do
            if [[ -z "${!variable:-}" ]]; then
              echo "::error::Missing required secret: ${variable}"
              exit 1
            fi
          done

      - name: Install Developer ID certificate
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_INSTALLER_CERTIFICATE_BASE64: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          MACOS_INSTALLER_IDENTITY: ${{ secrets.MACOS_INSTALLER_IDENTITY }}
        shell: bash
        run: |
          CERTIFICATE_PATH="${RUNNER_TEMP}/developer-id-application.p12"
          INSTALLER_CERTIFICATE_PATH="${RUNNER_TEMP}/developer-id-installer.p12}"
          KEYCHAIN_PATH="${RUNNER_TEMP}/app-signing.keychain-db"

          echo "CERTIFICATE_PATH=${CERTIFICATE_PATH}" >> "${GITHUB_ENV}"
          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "${GITHUB_ENV}"

          printf '%s' "${MACOS_CERTIFICATE_BASE64}" |
            base64 --decode -o "${CERTIFICATE_PATH}"

          printf '%s' "${MACOS_INSTALLER_CERTIFICATE_BASE64}" |
            base64 --decode -o "${INSTALLER_CERTIFICATE_PATH}"

          security create-keychain \
            -p "${MACOS_KEYCHAIN_PASSWORD}" \
            "${KEYCHAIN_PATH}"

          security set-keychain-settings \
            -lut 21600 \
            "${KEYCHAIN_PATH}"

          security unlock-keychain \
            -p "${MACOS_KEYCHAIN_PASSWORD}" \
            "${KEYCHAIN_PATH}"

          security import "${CERTIFICATE_PATH}" \
            -P "${MACOS_CERTIFICATE_PASSWORD}" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "${KEYCHAIN_PATH}"

          security import "${INSTALLER_CERTIFICATE_PATH}" \
            -P "${MACOS_CERTIFICATE_PASSWORD}" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "${KEYCHAIN_PATH}"

            security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "${MACOS_KEYCHAIN_PASSWORD}" \
            "${KEYCHAIN_PATH}"

          security list-keychain \
            -d user \
            -s "${KEYCHAIN_PATH}"

          security find-identity \
            -v \
            -p codesigning \
            "${KEYCHAIN_PATH}"

          security find-identity \
            -v \
            -p codesigning \
            "${KEYCHAIN_PATH}" |
            grep -F -- "${MACOS_CODESIGN_IDENTITY}"

          security find-identity \
            -v \
            "${KEYCHAIN_PATH}" |
            grep -F -- "${MACOS_INSTALLER_IDENTITY}"

      - name: Install Python build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r build-requirements.txt

      - name: Build signed macOS application
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        shell: bash
        run: |
          pyinstaller \
            --clean \
            --noconfirm \
            wav2polaris-mac-${{ matrix.arch }}.spec

      # - name: Verify Universal2 architectures
      #   shell: bash
      #   run: |
      #     ./packaging/macos/verify-universal2.sh \
      #       dist/wav2polaris

      - name: Verify Developer ID signature
        shell: bash
        run: |
          codesign \
            --verify \
            --deep \
            --strict \
            --verbose=2 \
            dist/wav2polaris

          codesign \
            --display \
            --verbose=4 \
            dist/wav2polaris 2>&1

      - name: Create pkg installer
        shell: bash
        run: |
          pkgbuild \
            --root ./dist \
            --install-location /usr/local/bin \
            --identifier "com.sublunarysphere.wav2polaris" \
            --version ${{ needs.verify.outputs.version }} \
            --sign "${{ secrets.MACOS_INSTALLER_IDENTITY }}" \
            wav2polaris-${{ needs.verify.outputs.version }}-${{ matrix.arch }}.pkg

      # - name: Create notarization archive
      #   shell: bash
      #   run: |
      #     ditto \
      #       -c \
      #       -k \
      #       --sequesterRsrc \
      #       --keepParent \
      #       dist/wav2polaris \
      #       "${RUNNER_TEMP}/wav2polaris-notarization.zip"

      - name: Submit application for notarization
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          xcrun notarytool submit \
            "wav2polaris-${{ needs.verify.outputs.version }}-${{ matrix.arch }}.pkg" \
            --apple-id "${APPLE_ID}" \
            --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
            --team-id "${APPLE_TEAM_ID}" \
            --wait

      - name: Staple and validate notarization ticket
        shell: bash
        run: |
          xcrun stapler staple wav2polaris-${{ needs.verify.outputs.version }}-${{ matrix.arch }}.pkg
          xcrun stapler validate wav2polaris-${{ needs.verify.outputs.version }}-${{ matrix.arch }}.pkg

          codesign \
            --verify \
            --deep \
            --strict \
            --verbose=2 \
            wav2polaris-${{ needs.verify.outputs.version }}-${{ matrix.arch }}.pkg

          spctl \
            --assess \
            --type install \
            --verbose=4 \
            wav2polaris-${{ needs.verify.outputs.version }}-${{ matrix.arch }}.pkg

      # - name: Create final macOS release archive
      #   env:
      #     RELEASE_VERSION: ${{ needs.verify.outputs.version }}
      #   shell: bash
      #   run: |
      #     ditto \
      #       -c \
      #       -k \
      #       --sequesterRsrc \
      #       --keepParent \
      #       dist/wav2polaris \
      #       "dist/wav2polaris-${{ matrix.arch }}-${RELEASE_VERSION}-macos-universal2.zip"

      - name: Upload macOS release asset
        uses: actions/upload-artifact@v6
        with:
          name: release-macos-${{ matrix.arch }}
          path: >-
            wav2polaris-${{ needs.verify.outputs.version }}-${{ matrix.arch }}.pkg
          if-no-files-found: error
          retention-days: 14

      - name: Clean up signing files
        if: always()
        shell: bash
        run: |
          if [[ -n "${KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "${KEYCHAIN_PATH}" || true
          fi

          if [[ -n "${CERTIFICATE_PATH:-}" ]]; then
            rm -f "${CERTIFICATE_PATH}"
          fi

  bundle:
    name: Prepare release assets
    if: >
      always() &&
      needs.build-windows.result == 'success' &&
      (needs.build-macos.result == 'success' ||
       needs.build-macos.result == 'skipped')
    needs:
      - build-windows
      - build-macos

    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      # - name: Download Linux asset
      #   uses: actions/download-artifact@v8
      #   with:
      #     name: release-linux
      #     path: release-assets

      - name: Download Windows asset
        uses: actions/download-artifact@v8
        with:
          name: release-windows
          path: release-assets

      - name: Download macOS asset
        if: needs.build-macos.result == 'success'
        uses: actions/download-artifact@v8
        with:
          pattern: release-macos-*
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets

          mapfile -d '' release_files < <(
              find . \
                  -maxdepth 1 \
                  -type f \
                  ! -name "SHA256SUMS" \
                  -print0 |
                  sort -z
          )

          if [[ "${#release_files[@]}" -eq 0 ]]; then
              echo "No release files were generated." >&2
              exit 1
          fi

          sha256sum "${release_files[@]}" > SHA256SUMS

          echo "Release assets:"
          ls -lh

          echo
          echo "Checksums:"
          cat SHA256SUMS

      - name: Upload complete release bundle
        uses: actions/upload-artifact@v6
        with:
          name: release-assets
          path: release-assets/*
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub release

    if: >
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')

    needs:
      - verify
      - bundle

    runs-on: ubuntu-22.04
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v8
        with:
          name: release-assets
          path: release-assets

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.verify.outputs.tag }}
          RELEASE_VERSION: ${{ needs.verify.outputs.version }}
        shell: bash
        run: |
          mapfile -d '' release_files < <(
              find release-assets \
                  -maxdepth 1 \
                  -type f \
                  -print0 |
                  sort -z
          )

          if [[ "${#release_files[@]}" -eq 0 ]]; then
              echo "No release assets were found." >&2
              exit 1
          fi

          gh release create "${RELEASE_TAG}" \
              "${release_files[@]}" \
              --verify-tag \
              --generate-notes \
              --title "wav2polaris ${RELEASE_VERSION}"
